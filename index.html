<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Vidros Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; box-sizing: border-box; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 18px; }
        #app { display: none; }
        #res { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; text-align: left; display: none; border-left: 5px solid #1a73e8; }
        .btn-zap { background: #25d366; text-decoration: none; display: none; line-height: 50px; color: white; font-weight: bold; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <div style="font-size: 50px;">💎</div>
        <h2>Perfil Vidros Pro</h2>
        <input type="password" id="p" placeholder="Digite a Senha">
        <button onclick="entrar()">ENTRAR</button>
    </div>

    <div id="app" class="card">
        <h2 style="color:#1a73e8">Orçamento Vidros</h2>
        <input type="text" id="cli" placeholder="Nome do Cliente">
        <input type="number" id="zap" placeholder="WhatsApp (DDD+Número)">
        <select id="vid">
            <option value="132.80">Incolor 6mm (R$ 132,80)</option>
            <option value="165.92">Incolor 8mm (R$ 165,92)</option>
            <option value="166.98">Verde/Fumê 6mm (R$ 166,98)</option>
            <option value="205.14">Verde/Fumê 8mm (R$ 205,14)</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="lar" placeholder="Largura (m)" step="0.01">
            <input type="number" id="alt" placeholder="Altura (m)" step="0.01" value="1.80">
        </div>
        <input type="number" id="mao" placeholder="Mão de Obra (R$)" value="0">
        <button onclick="calc()">CALCULAR PREÇO</button>
        <div id="res"></div>
        <a id="linkZap" class="btn-zap" target="_blank">ENVIAR WHATSAPP</a>
    </div>

    <script>
        function entrar() {
            if(document.getElementById("p").value.toLowerCase() === "pimentel0318") {
                document.getElementById("login").style.display = "none";
                document.getElementById("app").style.display = "block";
            } else { alert("Senha incorreta!"); }
        }
        function calc() {
            const l = parseFloat(document.getElementById("lar").value);
            const a = parseFloat(document.getElementById("alt").value);
            const v = parseFloat(document.getElementById("vid").value);
            const m = parseFloat(document.getElementById("mao").value) || 0;
            
            if (l > 0 && a > 0) {
                const area = l * a;
                const total = (area * v) + m;
                document.getElementById("res").style.display = "block";
                document.getElementById("res").innerHTML = "Área: " + area.toFixed(2) + " m²<br><strong>Valor Total: R$ " + total.toFixed(2) + "</strong>";
                
                document.getElementById("linkZap").style.display = "block";
                const msg = "Orçamento Perfil Vidros\nCliente: " + document.getElementById("cli").value + "\nTotal: R$ " + total.toFixed(2);
                document.getElementById("linkZap").href = "https://wa.me/" + document.getElementById("zap").value + "?text=" + encodeURIComponent(msg);
            }
        }
    </script>
</body>
</html>
